
{% load static %}
<div class="hero_area">
<!-- header section strats -->
<header class="header_section" dir="rtl">
<div class="container">
   <nav class="navbar navbar-expand-lg custom_nav-container ">
      <a class="navbar-brand" href="../middle_login.html"><img width="250" src="/static/img/logo_core.png" alt="#" /></a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class=""> </span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
         <ul class="navbar-nav">
           <li class="nav-item {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
               <a class="nav-link" href="{% url 'home' %}">خانه <span class="sr-only">(current)</span></a>
            </li>
            <li class="nav-item {% if request.resolver_match.url_name == 'introduction' %}active{% endif %}">
               <a class="nav-link" href="{% url 'introduction' %}">معرفی</a>
            </li>
            <li class="nav-item {% if request.resolver_match.url_name == 'articles' %}active{% endif %}">
               <a class="nav-link" href="{% url 'articles' %}">مقالات</a>
            </li>
           <li class="nav-item {% if request.resolver_match.url_name == 'contact_us' %}active{% endif %}">
               <a class="nav-link" href="{% url 'contact_us' %}">تماس با ما</a>
            </li>
                <li class="nav-item {% if request.resolver_match.url_name == 'about_us' %}active{% endif %}">
               <a class="nav-link" href="{% url 'about_us' %}">درباره ما</a>
            </li>
             
             <li class="nav-item">
               <a href="{% url 'login_middle' %}" class="button-log d-block">ورود مدیران مجتمع</a>
             </li>
    
         </ul>
      </div>
{#                     <a href="{% url 'login_middle' %}" class="btn btn-dark d-md-block">ورود مدیران مجتمع</a>#}
   </nav>
</div>
 
</header>
<!-- end header section -->

    <!-- slider section -->
<section class="slider_section ">
<div class="slider_bg_box">
   <img src="/static/home/images/slider-bg.jpg" alt="">
</div>
<div id="customCarousel1" class="carousel slide" data-ride="carousel">
   <div class="carousel-inner">
{% for slide in sliders %}
<div class="carousel-item {% if forloop.first %}active{% endif %}">
<div class="container">
<div class="row">
<div class="col-md-7 col-lg-6">
   <div class="detail-box">
      <h1>
         <span>{{ slide.title }}</span>
      </h1>
      <p>{{ slide.text }}</p>
   </div>
</div>
</div>
</div>
</div>
{% endfor %}
</div>
   <div class="container">
      <ol class="carousel-indicators">
       {% for slide in sliders %}
       <li data-target="#customCarousel1"
           data-slide-to="{{ forloop.counter0 }}"
           class="{% if forloop.first %}active{% endif %}">
       </li>
       {% endfor %}
    </ol>
   </div>
</div>
</section>
    <!-- end slider section -->
</div>
