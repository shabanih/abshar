<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحه پیدا نشد</title>

    <style>
        body {
            font-family: sans-serif;
            background: #f5f5f5;
            text-align: center;
            padding-top: 100px;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 80px;
            margin: 0;
            color: #e74c3c;
        }

        h2 {
            margin-top: 10px;
            color: #333;
        }

        p {
            color: #777;
            margin-top: 15px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        a:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>404</h1>
        <h2>ساختمان پیدا نشد</h2>

        <p>
            این زیر دامنه معتبر نیست یا ساختمان غیرفعال شده است.
        </p>

        <a href="/">بازگشت به صفحه اصلی</a>
    </div>

</body>
</html>
